listStations:
  get:
    tags:
      - Stations
    operationId: listStations
    x-permissions:
      - gestionar_dispositivos
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/PaginatedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
  post:
    tags:
      - Stations
    operationId: createStation
    x-permissions:
      - gestionar_dispositivos
    requestBody:
      $ref: '../openapi.yaml#/components/requestBodies/createStationRequest'
    responses:
      '201':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '422':
        $ref: '../openapi.yaml#/components/responses/ValidationError'
updateStation:
  parameters:
    - $ref: '../openapi.yaml#/components/parameters/StationId'
