listIncidents:
  get:
    tags:
      - Incidents
    operationId: listIncidents
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/PaginatedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
  post:
    tags:
      - Incidents
    operationId: createIncident
    x-roles:
      - superadmin
      - auxiliar
      - toe
    requestBody:
      $ref: '../openapi.yaml#/components/requestBodies/createIncidentRequest'
    responses:
      '201':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '422':
        $ref: '../openapi.yaml#/components/responses/ValidationError'
