listTeacherAttendance:
  get:
    tags:
      - TeacherAttendance
    operationId: listTeacherAttendance
    x-permissions:
      - gestionar_planilla
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/PaginatedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
