      - TeacherAttendance
    operationId: listTeacherRates
    x-permissions:
      - gestionar_planilla
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/PaginatedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
  post:
    tags:
      - TeacherAttendance
    operationId: createTeacherRate
    x-permissions:
      - gestionar_planilla
    requestBody:
      $ref: '../openapi.yaml#/components/requestBodies/createTeacherRateRequest'
    responses:
      '201':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '409':
        $ref: '../openapi.yaml#/components/responses/ConflictError'
      '422':
        $ref: '../openapi.yaml#/components/responses/ValidationError'
