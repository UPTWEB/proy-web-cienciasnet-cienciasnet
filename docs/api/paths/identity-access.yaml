listAccounts:
  get:
    tags:
      - IdentityAccess
    operationId: listAccounts
    x-permissions:
      - gestionar_usuarios
    parameters:
      - $ref: '../openapi.yaml#/components/parameters/Page'
      - $ref: '../openapi.yaml#/components/parameters/PerPage'
      - $ref: '../openapi.yaml#/components/parameters/Search'
      - $ref: '../openapi.yaml#/components/parameters/Active'
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/PaginatedResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
  post:
    tags:
      - IdentityAccess
    operationId: createAccount
    x-permissions:
      - gestionar_usuarios
    requestBody:
      $ref: '../openapi.yaml#/components/requestBodies/createAccountRequest'
    responses:
      '201':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '409':
        $ref: '../openapi.yaml#/components/responses/ConflictError'
      '422':
        $ref: '../openapi.yaml#/components/responses/ValidationError'
getAccount:
  parameters:
    - $ref: '../openapi.yaml#/components/parameters/AccountId'
  get:
    tags:
      - IdentityAccess
    operationId: getAccount
    x-permissions:
      - gestionar_usuarios
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFoundError'
  patch:
    tags:
      - IdentityAccess
    operationId: updateAccount
    x-permissions:
      - gestionar_usuarios
    requestBody:
      $ref: '../openapi.yaml#/components/requestBodies/updateAccountRequest'
    responses:
      '200':
        $ref: '../openapi.yaml#/components/responses/ResourceResponse'
      '403':
        $ref: '../openapi.yaml#/components/responses/ForbiddenError'
      '404':
        $ref: '../openapi.yaml#/components/responses/NotFoundError'
      '409':
        $ref: '../openapi.yaml#/components/responses/ConflictError'
      '422':
        $ref: '../openapi.yaml#/components/responses/ValidationError'
