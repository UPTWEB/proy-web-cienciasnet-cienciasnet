createAccountRequest:
  type: object
  additionalProperties: false
  required:
    - name
    - email
    - roles
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 150
    email:
      type: string
      format: email
    roles:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        $ref: '../openapi.yaml#/components/schemas/Role'
updateAccountRequest:
  type: object
  additionalProperties: false
  required: []
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 150
    email:
      type: string
      format: email
