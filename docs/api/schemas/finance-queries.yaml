sendPaymentRemindersRequest:
  type: object
  additionalProperties: false
  required:
    - obligation_ids
    - channel
  properties:
    obligation_ids:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        type: string
        format: uuid
    channel:
      type: string
      enum:
        - email
        - in_app
        - both
