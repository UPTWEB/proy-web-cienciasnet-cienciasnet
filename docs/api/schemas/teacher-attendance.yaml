createTeacherRateRequest:
  type: object
  additionalProperties: false
  required:
    - teacher_id
    - hourly_rate
    - effective_from
  properties:
    teacher_id:
      type: string
      format: uuid
    hourly_rate:
      type: string
      pattern: ^\d{1,10}(\.\d{1,2})?$
    effective_from:
      type: string
      format: date
    effective_until:
      type: string
      format: date
createPayrollLiquidationRequest:
  type: object
  additionalProperties: false
  required:
    - period_start
    - period_end
  properties:
    period_start:
      type: string
      format: date
    period_end:
      type: string
      format: date
    teacher_ids:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        type: string
        format: uuid
createTeacherAttendanceAdjustmentRequest:
  type: object
  additionalProperties: false
  required:
    - teacher_id
    - date
    - adjustment_type
    - minutes
    - reason
  properties:
    teacher_id:
      type: string
      format: uuid
    date:
      type: string
      format: date
    adjustment_type:
      type: string
      enum:
        - add
        - subtract
    minutes:
      type: integer
      minimum: 1
    reason:
      type: string
      minLength: 1
      maxLength: 1000
assignClassSessionSubstituteRequest:
  type: object
  additionalProperties: false
  required:
    - teacher_id
  properties:
    teacher_id:
      type: string
      format: uuid
generateTeacherPayrollReportRequest:
  type: object
  additionalProperties: false
  required: [period_start, period_end, format]
  properties:
    period_start: { type: string, format: date }
    period_end: { type: string, format: date }
    format: { type: string, enum: [pdf, xlsx] }
    teacher_ids:
      type: array
      uniqueItems: true
      items: { type: string, format: uuid }
