createPaymentConceptRequest:
  type: object
  additionalProperties: false
  required:
    - code
    - name
    - amount
  properties:
    code:
      type: string
      minLength: 1
      maxLength: 30
    name:
      type: string
      minLength: 1
      maxLength: 150
    amount:
      type: string
      pattern: ^\d{1,10}(\.\d{1,2})?$
    due_day:
      type: integer
      minimum: 1
      maximum: 31
    recurrence:
      type: string
      enum:
        - single
        - monthly
        - annual
    early_payment_discount: { type: string, pattern: '^\d{1,10}(\.\d{1,2})?$' }
    early_payment_deadline: { type: string, format: date }
createStudentBenefitRequest:
  type: object
  additionalProperties: false
  required:
    - student_id
    - benefit_type
    - starts_on
  properties:
    student_id:
      type: string
      format: uuid
    benefit_type:
      type: string
      enum:
        - percentage
        - fixed
        - waiver
    value:
      type: string
      nullable: true
      description: Obligatorio para porcentaje o monto fijo; nulo para exoneración.
      pattern: ^\d{1,10}(\.\d{1,2})?$
    concept_ids:
      type: array
      uniqueItems: true
      items: { type: string, format: uuid }
    stackable_with_early_payment: { type: boolean, default: false }
    starts_on:
      type: string
      format: date
    ends_on:
      type: string
      format: date
updatePaymentConceptRequest:
  type: object
  additionalProperties: false
  properties:
    name: { type: string, minLength: 1, maxLength: 150 }
    amount: { type: string, pattern: '^\d{1,10}(\.\d{1,2})?$' }
    due_day: { type: integer, minimum: 1, maximum: 31 }
    recurrence: { type: string, enum: [single, monthly, annual] }
    early_payment_discount: { type: string, pattern: '^\d{1,10}(\.\d{1,2})?$' }
    early_payment_deadline: { type: string, format: date }
