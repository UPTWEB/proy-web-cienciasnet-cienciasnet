generatePaymentObligationsRequest:
  type: object
  additionalProperties: false
  required:
    - academic_period_id
    - concept_id
    - due_date
  properties:
    academic_period_id:
      type: string
      format: uuid
    concept_id:
      type: string
      format: uuid
    due_date:
      type: string
      format: date
    student_ids:
      type: array
      minItems: 1
      uniqueItems: true
      items:
        type: string
        format: uuid
adjustPaymentObligationRequest:
  type: object
  additionalProperties: false
  required:
    - adjustment_type
    - amount
    - reason
  properties:
    adjustment_type:
      type: string
      enum:
        - charge
        - discount
        - waiver
    amount:
      type: string
      pattern: ^\d{1,10}(\.\d{1,2})?$
    reason:
      type: string
      minLength: 1
      maxLength: 1000
createPaymentMovementRequest:
  type: object
  additionalProperties: false
  required:
    - obligation_id
    - movement_type
    - amount
    - occurred_at
    - method
  properties:
    obligation_id:
      type: string
      format: uuid
    movement_type:
      type: string
      enum:
        - payment
        - reversal
        - refund
    amount:
      type: string
      pattern: ^\d{1,10}(\.\d{1,2})?$
    occurred_at:
      type: string
      format: date-time
    method:
      type: string
      enum:
        - cash
        - transfer
        - card
        - yape
        - plin
        - other
    reference:
      type: string
      minLength: 1
      maxLength: 150
    reason:
      type: string
      minLength: 1
      maxLength: 1000
createBulkPaymentObligationAdjustmentRequest:
  type: object
  additionalProperties: false
  required: [filters, adjustment_type, amount, reason]
  properties:
    filters:
      type: object
      additionalProperties: false
      properties:
        obligation_ids: { type: array, items: { type: string, format: uuid }, uniqueItems: true }
        concept_id: { type: string, format: uuid }
        grade_id: { type: string, format: uuid }
        section_id: { type: string, format: uuid }
    adjustment_type: { type: string, enum: [charge, discount, waiver] }
    amount: { type: string, pattern: '^\d{1,10}(\.\d{1,2})?$' }
    reason: { type: string, minLength: 3, maxLength: 1000 }
