createScheduleRequest:
  type: object
  additionalProperties: false
  required:
    - teaching_assignment_id
    - weekday
    - starts_at
    - ends_at
  properties:
    teaching_assignment_id:
      type: string
      format: uuid
    weekday:
      type: integer
      minimum: 1
      maximum: 7
    starts_at:
      type: string
      pattern: ^([01]\d|2[0-3]):[0-5]\d$
    ends_at:
      type: string
      pattern: ^([01]\d|2[0-3]):[0-5]\d$
    room:
      type: string
      minLength: 1
      maxLength: 100
createCalendarEventRequest:
  type: object
  additionalProperties: false
  required:
    - title
    - starts_at
    - ends_at
    - event_type
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 200
    starts_at:
      type: string
      format: date-time
    ends_at:
      type: string
      format: date-time
    event_type:
      type: string
      enum:
        - academic
        - holiday
        - meeting
        - other
    description:
      type: string
      minLength: 1
      maxLength: 2000
